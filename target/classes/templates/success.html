<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Success - ZestFind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Poppins',sans-serif; background:#F8FAFC; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { border-radius:20px; padding:50px 40px; text-align:center; box-shadow:0 8px 40px rgba(0,0,0,0.1); max-width:480px; width:100%; }
        .icon { font-size:4rem; margin-bottom:16px; }
        h1 { font-size:1.8rem; font-weight:800; color:#1E3A8A; }
        p { color:#64748B; margin-top:8px; }
        .btn-home { background:#FF6B35; color:white; border:none; border-radius:12px; padding:12px 32px; font-size:1rem; font-weight:600; font-family:'Poppins',sans-serif; cursor:pointer; text-decoration:none; display:inline-block; margin-top:24px; transition:all 0.3s; }
        .btn-home:hover { background:#e55a25; color:white; transform:translateY(-2px); }
        .btn-report { background:#1E3A8A; color:white; border:none; border-radius:12px; padding:12px 32px; font-size:1rem; font-weight:600; font-family:'Poppins',sans-serif; cursor:pointer; text-decoration:none; display:inline-block; margin-top:24px; margin-left:12px; transition:all 0.3s; }
        .btn-report:hover { background:#FF6B35; color:white; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>Report Submitted!</h1>
        <p>Tumhari report successfully save ho gayi hai.<br>Hum jald hi tumse contact karenge.</p>
        <div class="mt-3">
            <a href="/" class="btn-home">🏠 Home</a>
            <a href="/report" class="btn-report">➕ Another Report</a>
        </div>
    </div>
</body>
</html>
