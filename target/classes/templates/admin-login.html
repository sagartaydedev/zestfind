<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ZestFind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#1E3A8A 0%,#2D4CC8 100%);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .login-card {
            background:white;
            border-radius:24px;
            padding:48px 40px;
            width:100%;
            max-width:420px;
            box-shadow:0 20px 60px rgba(0,0,0,0.3);
            text-align:center;
        }
        .logo { font-size:2rem; font-weight:800; color:#1E3A8A; margin-bottom:4px; }
        .logo span { color:#FF6B35; }
        .subtitle { color:#64748B; font-size:0.88rem; margin-bottom:32px; }
        .admin-badge {
            background:#FFF0EB;
            color:#FF6B35;
            border:1px solid #FF6B35;
            border-radius:20px;
            padding:4px 16px;
            font-size:0.78rem;
            font-weight:700;
            display:inline-block;
            margin-bottom:24px;
        }
        .form-label { font-weight:600; font-size:0.88rem; color:#1E293B; text-align:left; display:block; margin-bottom:6px; }
        .form-control {
            border:2px solid #E2E8F0;
            border-radius:12px;
            padding:13px 16px;
            font-family:'Poppins',sans-serif;
            font-size:0.9rem;
            width:100%;
            outline:none;
            transition:all 0.3s;
        }
        .form-control:focus { border-color:#FF6B35; box-shadow:0 0 0 3px rgba(255,107,53,0.15); }
        .btn-login {
            background:linear-gradient(135deg,#FF6B35,#e55a25);
            color:white;
            border:none;
            border-radius:12px;
            padding:14px;
            font-size:1rem;
            font-weight:700;
            font-family:'Poppins',sans-serif;
            cursor:pointer;
            width:100%;
            margin-top:20px;
            transition:all 0.3s;
        }
        .btn-login:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(255,107,53,0.4); }
        .error-box {
            background:#FEE2E2;
            color:#DC2626;
            border-radius:10px;
            padding:10px 16px;
            font-size:0.85rem;
            font-weight:600;
            margin-bottom:16px;
        }
        .back-link { color:#64748B; font-size:0.85rem; text-decoration:none; display:inline-block; margin-top:20px; }
        .back-link:hover { color:#FF6B35; }
        .lock-icon { font-size:3rem; margin-bottom:16px; }
        .password-wrapper { position:relative; }
        .toggle-pass {
            position:absolute;
            right:14px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            color:#64748B;
            background:none;
            border:none;
            font-size:1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock-icon">🔐</div>
        <div class="logo">Zest<span>Find</span></div>
        <div class="subtitle">College Lost & Found Portal</div>
        <div class="admin-badge">⚙️ Admin Access Only</div>

        <div class="error-box" th:if="${error}" th:text="${error}"></div>

        <form action="/admin/login" method="post">
            <div style="text-align:left;margin-bottom:20px;">
                <label class="form-label">
                    <i class="fas fa-lock me-1" style="color:#FF6B35"></i>Admin Password
                </label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="passInput"
                           class="form-control" placeholder="Enter admin password" required autofocus>
                    <button type="button" class="toggle-pass" onclick="togglePass()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
            </button>
        </form>

        <a href="/" class="back-link">
            <i class="fas fa-arrow-left me-1"></i>Back to Home
        </a>
    </div>

<script>
    function togglePass() {
        const inp = document.getElementById('passInput');
        const icon = document.getElementById('eyeIcon');
        if (inp.type === '8767Sagar8767') {
            inp.type = 'text';
            icon.className = 'fas fa-eye-slash';
        } else {
            inp.type = '8767Sagar8767';
            icon.className = 'fas fa-eye';
        }
    }
</script>
</body>
</html>
